name: Desktop E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: desktop-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-artifacts
          path: apps/desktop/e2e/artifacts
          if-no-files-found: ignore
